name: 🐍 Generate Snake

on:
  schedule:
    # Daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual runs

  # Run once when the workflow itself is pushed/changed
  push:
    branches:
      - main
    paths:
      - ".github/workflows/snake.yml"

# Required so the job can push to the output branch
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🐍 Generate snake contribution graph
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2306b6d4&color_dots=%23161b22,%234c1d95,%237c3aed,%23c026d3,%23ec4899

      - name: 📤 Publish to `output` branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          keep_files: false
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "chore: update snake animation 🐍"
